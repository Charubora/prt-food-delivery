---
- name: Configure devops-master
  hosts: devops_master
  become: yes
  tasks:
    - name: Install Java
      apt:
        name: openjdk-17-jdk
        state: present
        update_cache: yes

    - name: Install Jenkins via Docker
      shell: |
        apt install -y docker.io
        systemctl start docker
        systemctl enable docker
        docker run -d --name jenkins -p 8080:8080 -p 50000:50000 -v jenkins_home:/var/jenkins_home jenkins/jenkins:lts
      ignore_errors: yes

    - name: Verify Jenkins container
      shell: docker ps
      register: jenkins_status

    - name: Show Jenkins status
      debug:
        var: jenkins_status.stdout

- name: Configure build-agent
  hosts: build_agent
  become: yes
  tasks:
    - name: Install Java
      apt:
        name: openjdk-17-jdk
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes
