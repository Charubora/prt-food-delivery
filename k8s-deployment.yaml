apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-deployment
  labels:
    app: food-delivery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-delivery
  template:
    metadata:
      labels:
        app: food-delivery
    spec:
      containers:
      - name: food-delivery
        image: prt-food-delivery:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-service
spec:
  type: NodePort
  selector:
    app: food-delivery
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    nodePort: 30080
